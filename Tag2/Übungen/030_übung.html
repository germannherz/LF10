Madam Pince bittet dich, eine magische Infoseite für neue Erstklässler zu bauen,

Deine Aufgabe: Erstelle eine HTML-Webseite über Hogwarts (oder dein Lieblingshaus, Zauber, Charaktere).

Basic HTML: - <!DOCTYPE html>

            - <footer>: Signatur der magischen Webseite
            - Zusätzlich: mindestens 2 von diesen <section>, <article>, <nav>

Inhalt:     - <h1>: Name deiner Seite
            - Mindestens 2 Unterüberschriften
            - Mindestens 3 Absätze Text

Listen: - <ul>: z. B. Häuser, Zaubersprüche oder magische Gegenstände
        - <ol>: „So wirst du ein Hogwarts-Schüler in 5 Schritten“

Links:  - Mindestens 3 Links
        - 1 Link öffnet sich in neuem Tab
        - 1 Sprunglink innerhalb der Seite

Bonus:  - Navigationsmenü zu „Häuser“, „Zauber“, „Regeln“
        - Footer-Text: „Diese Seite ist durch alte Magie geschützt.“ -->
