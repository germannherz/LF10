<!-- „Die erste Webseite der Menschheit“

Stell dir vor, du bist die erste Person, die HTML entdeckt hat. Deine Aufgabe ist es, die erste Webseite der Welt zu erstellen.

Deine Mission:
Erstelle eine HTML-Boilerplate und passe sie leicht an.

Anforderungen:
1. Ändere den <title> zu etwas Passendem, zum Beispiel:
    - „Erste Seite im Universum“
    - „Projekt: Internet starten“
    - „Hello World 1.0“

2. Füge eine Überschrift (<h1>) ein:
    - „Hallo Welt“
    - oder „Ich habe das Internet erschaffen“ 

3. Füge einen kurzen Text (<p>) darunter ein:
    - zum Beispiel „Dies ist der Anfang von allem.“ -->

    <!DOCTYPE html>

    <html lang="de">
        <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scaled=1.0">
            <title>Projekt: Im Internet starten</title>

        </head>

        <body>

            <header>
                <h1>Ich habe gar nichts gemacht</h1>
            </header>

            <main>
                <p>Dies ist der Anfang von allem. Hoffentlich... </p>
            </main>

            <footer>
            <p>&copy;2026 Germann Herzog</p>
            </footer>
        </body>


    </body>
    </html>
